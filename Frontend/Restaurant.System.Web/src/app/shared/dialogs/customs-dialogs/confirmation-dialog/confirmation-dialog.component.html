<rs-dialog-base>
  <div dialog-header class="dialog-header">
      <div class="flex flex-row">
        <div class="w-1/8">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        </div>
        <span class="font-bold">{{ data.title }}</span>
      </div>
  </div>

  <div class="dialog-content flex">
    <p class="text-center">{{ data.message }}</p>
  </div>

  <div dialog-footer class="dialog-footer">
    <button (click)="close(false)" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded text-sm transition">Cancel</button>
    <button (click)="close(true)" [class]="'text-sm transition btn-confirm' + variant">{{ data.confirmText || 'OK' }}</button>
  </div>
</rs-dialog-base>
