<rs-header-control (toggle)="isExpanded.set(!isExpanded())"></rs-header-control>

<div class="flex flex-1 overflow-hidden h-[calc(100vh-64px)]">
  <!-- Sidebar Navigation -->
  <aside [class.w-64]="isExpanded()" 
  [class.w-16]="!isExpanded()"
  class="bg-white border-r transition-all duration-300 ease-in-out flex flex-col justify-between py-4">
    <nav class="space-y-1 px-0">
        @for (item of navItems; track item.label) {
          @if (!item.children) {
            <rs-nav-item-control [navItem]="item" [isExpanded]="isExpanded()"></rs-nav-item-control>
          } @else {
            <rs-nav-item-group-control [navItem]="item" [isExpanded]="isExpanded()"></rs-nav-item-group-control>
          }
        } 
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 overflow-y-auto bg-gray-50/50 p-6 md:p-10">
    <router-outlet></router-outlet>
    
  </main>
</div>
