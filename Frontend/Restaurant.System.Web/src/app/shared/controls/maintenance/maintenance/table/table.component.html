<div class="relative">
    <table mat-table [dataSource]="loading() ? skeletonRows : rows()">
        @for (column of columns(); track column.key){
            <ng-container [matColumnDef]="column.key">
                <th mat-header-cell *matHeaderCellDef>{{ column.label }}</th>
                <td mat-cell *matCellDef="let row">
                    @if (loading()) {
                        <div class="h-4 w-full rounded bg-gray-200 animate-pulse"></div>
                    } @else {
                        {{ row[column.key] }}
                    }
                </td>
            </ng-container>
            
        }
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="action-header">Actions</th>
            <td mat-cell *matCellDef="let row" class="action-row">
                @if (loading()) {
                    <div class="h-8 w-20 rounded bg-gray-200 animate-pulse"></div>
                } @else {
                    <div class="action-grp">
                        @for(action of actions(); track action.key) {
                            <button class="action-btn"
                            (click)="actionClicked.emit({
                                action: action.key,
                                row: row
                            })">
                                <mat-icon>{{ action.icon }}</mat-icon>
                                <span class="action-label">{{ action.label }}</span>
                            </button>
                        }
                    </div>
                }
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
    </table>
</div>
