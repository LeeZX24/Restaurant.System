@if(!navItem()?.children) {
    <a (click)="handleNavigate()"
    (keydown.enter)="handleNavigate()"
    tabindex="0"
    [class.font-bold]="isActive()"
    [class.is-active]="isActive()"
    class="nav-item-link">
        <ng-container [ngTemplateOutlet]="navContent"></ng-container>
    </a>
} @else {
    <ng-container [ngTemplateOutlet]="navContent"></ng-container>
}

<ng-template #navContent>
    <div class="flex items-center h-12 w-full min-w-0 hover:bg-slate-50">
        <div class="w-16 flex-shrink-0 flex items-center justify-center">
            <mat-icon>{{navItem()?.icon}}</mat-icon>
        </div>

        @if(isExpanded()){
            <span class="ml-2 font-medium truncate uppercase text-xs tracking-wider flex-1 font-[inherit]">
                {{navItem()?.label}}
            </span>
        }
    </div>
</ng-template>
