name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check Supabase DB
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}")

          body=$(echo "$response" | head -n 1)
          status=$(echo "$response" | tail -n 1)

          echo "Response: $body"
          echo "HTTP: $status"

          if [ "$status" != "200" ]; then
            echo "Supabase health check FAILED"
            exit 1
          fi
