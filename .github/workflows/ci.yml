name: Monorepo CI/CD

on:
  push:
    branches:
      - master
      - release
  pull_request:
    branches:
      - master
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore .NET Projects
        run: dotnet restore Backend/Backend.sln

      - name: Run Backend Tests
        if: github.event_name == 'pull_request' && (github.ref != 'refs/heads/master' && github.ref != 'refs/heads/release')
        run: dotnet test Backend/Backend.sln --no-build --verbosity normal

      - name: Build .NET Projects
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release')
        run: dotnet build Backend/Backend.sln --no-restore --configuration Release

      - name: Publish Backend
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/release'
        run: dotnet publish Backend/Backend.sln -c Release -o ./publish

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            Restaurant.System
            UI.Base

      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}

      # Setup Node.js
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          check-latest: true

      - name: Install Dependencies
        run: npm ci --progress=false
        working-directory: Frontend/Restaurant.System.Web

      - name: Build Form Submodule
        run: CI=true npm run build:forms
        working-directory: Frontend/Restaurant.System.Web

      - name: Lint Frontend
        run: |
          CI=true npm run lint
          CI=true npm run test -- --watch=false
        working-directory: Frontend/Restaurant.System.Web

      - name: Get Next Version
        id: next_version
        run: |
          # Use semantic-release dry-run to see what the next version is
          NEXT_VER=$(npx semantic-release --dry-run | grep 'The next release version is' | sed 's/.*is //')
          echo "version=${NEXT_VER:-0.0.0-snapshot}" >> $GITHUB_OUTPUT
        working-directory: Frontend/Restaurant.System.Web
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Generate App Meta
        if: github.event_name != 'pull_request'
        run: |
          export APP_VERSION=${{ steps.next_version.outputs.version }}

          # 2. Determine Channel
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            CHANNEL="beta"
          elif [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
            CHANNEL="release"
          else
            CHANNEL="development"
          fi

          # 3. Write the file
          mkdir -p src/assets
          cat > src/assets/app-meta.js <<EOF
          window.APP_META = {
            version: "$VERSION",
            channel: "$CHANNEL",
            buildTime: "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          };
          EOF

          CI=true npm run build:beta -- \
            --base-href=/Restaurant.System/beta/ \
            --deploy-url=/Restaurant.System/beta/ \
            --output-path=dist/beta

          CI=true npm run build:release -- \
            --base-href=/Restaurant.System/ \
            --deploy-url=/Restaurant.System/ \
            --output-path=dist/release

        working-directory: Frontend/Restaurant.System.Web

      - name: Run Semantic Release
        id: semantic
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/release' || github.ref == 'refs/heads/master')
        run: npx semantic-release
        working-directory: Frontend/Restaurant.System.Web
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Setup Pages
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release')

        uses: actions/configure-pages@v5

      - name: Prepare Pages
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release')
        run: |
          mkdir -p site
          mkdir -p site/beta

          if [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
            cp -r dist/release/browser/* site/
            # Rename the CSR file to the standard index.html
            if [ -f "site/index.csr.html" ]; then
              mv site/index.csr.html site/index.html
            fi
          fi

          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            cp -r dist/beta/browser/* site/
            cp -r dist/beta/browser/* site/beta/

            [ -f "site/index.csr.html" ] && mv site/index.csr.html site/index.html
            [ -f "site/beta/index.csr.html" ] && mv site/beta/index.csr.html site/beta/index.html
          fi
        working-directory: Frontend/Restaurant.System.Web

      - name: Upload Pages Artifact
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release')
        uses: actions/upload-pages-artifact@v4
        with:
          path: Frontend/Restaurant.System.Web/site

  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: frontend
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy to Render Beta
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND_BETA_URL }}

      - name: Deploy to Render Release
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND_RELEASE_URL }}
